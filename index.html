<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>제휴문의</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f8fb;
      --fg: #1f2933;
      --panel: #ffffff;
      --muted: #5d6978;
      --border: #d7dce2;
      --accent: #0f766e;
      --accent-fg: #ffffff;
      --field: #ffffff;
      --success: #047857;
      --error: #b91c1c;
    }

    [data-theme="dark"] {
      --bg: #101820;
      --fg: #f8fafc;
      --panel: #182330;
      --muted: #b8c2cc;
      --border: #334155;
      --accent: #2dd4bf;
      --accent-fg: #06201d;
      --field: #101820;
      --success: #34d399;
      --error: #f87171;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background 180ms ease, color 180ms ease;
    }

    main {
      width: min(100%, 680px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgb(15 23 42 / 12%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.1;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
    }

    form {
      display: grid;
      gap: 18px;
      margin-top: 28px;
    }

    .field {
      display: grid;
      gap: 8px;
      text-align: left;
    }

    label {
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      min-height: 44px;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--field);
      color: var(--fg);
      font: inherit;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      outline: 3px solid color-mix(in srgb, var(--accent), transparent 78%);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    button {
      min-height: 44px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: var(--accent-fg);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    button:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent), transparent 45%);
      outline-offset: 3px;
    }

    .status {
      min-height: 24px;
      margin: 0;
      font-weight: 700;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--error);
    }

    @media (max-width: 560px) {
      main {
        padding: 24px;
      }

      .actions {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>제휴문의</h1>
    <p>아래 내용을 보내주시면 확인 후 연락드리겠습니다.</p>

    <form id="partner-form" action="https://formspree.io/f/xpqblkzd" method="POST">
      <input type="hidden" name="_subject" value="새 제휴문의가 도착했습니다">

      <div class="field">
        <label for="name">이름</label>
        <input id="name" name="name" type="text" autocomplete="name" required>
      </div>

      <div class="field">
        <label for="company">회사명</label>
        <input id="company" name="company" type="text" autocomplete="organization" required>
      </div>

      <div class="field">
        <label for="email">이메일</label>
        <input id="email" name="email" type="email" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="phone">연락처</label>
        <input id="phone" name="phone" type="tel" autocomplete="tel">
      </div>

      <div class="field">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <div class="actions">
        <button id="submit-button" type="submit">문의 보내기</button>
        <button class="secondary" id="theme-toggle" type="button">Dark mode</button>
      </div>

      <p class="status" id="form-status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const root = document.documentElement;
    const toggle = document.querySelector("#theme-toggle");
    const form = document.querySelector("#partner-form");
    const submitButton = document.querySelector("#submit-button");
    const statusMessage = document.querySelector("#form-status");
    const storedTheme = localStorage.getItem("theme");
    const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

    function setTheme(theme) {
      root.dataset.theme = theme;
      localStorage.setItem("theme", theme);
      toggle.textContent = theme === "dark" ? "Light mode" : "Dark mode";
    }

    setTheme(storedTheme || (systemPrefersDark ? "dark" : "light"));

    toggle.addEventListener("click", () => {
      setTheme(root.dataset.theme === "dark" ? "light" : "dark");
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      statusMessage.textContent = "";
      statusMessage.className = "status";
      submitButton.disabled = true;
      submitButton.textContent = "전송 중...";

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: {
            Accept: "application/json",
          },
        });

        if (!response.ok) {
          throw new Error("Formspree request failed");
        }

        form.reset();
        statusMessage.textContent = "문의가 전송되었습니다.";
        statusMessage.classList.add("success");
      } catch (error) {
        statusMessage.textContent = "전송에 실패했습니다. 잠시 후 다시 시도해주세요.";
        statusMessage.classList.add("error");
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "문의 보내기";
      }
    });
  </script>
</body>
</html>
